<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>3DSTUXXX Offline</title>
    <style>
      :root {
        color: #0f172a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: #f8fafc;
        display: flex;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 520px;
      }

      svg {
        height: 56px;
        width: 56px;
      }

      h1 {
        font-size: clamp(2rem, 8vw, 3.4rem);
        line-height: 1;
        margin: 24px 0 16px;
      }

      p {
        color: #475569;
        font-size: 1rem;
        line-height: 1.6;
      }

      a {
        color: #2563eb;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/layerpilot-icon.svg" alt="3DSTUXXX" width="56" height="56" />
      <h1>Offline console</h1>
      <p>3DSTUXXX can open from the installed app shell, but live printer, queue, and file data need the local API connection. Reconnect to the network or production server, then refresh.</p>
      <p><a href="/">Try again</a></p>
    </main>
  </body>
</html>
